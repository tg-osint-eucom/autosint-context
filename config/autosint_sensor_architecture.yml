version: 1
source: docs/AUTOSINT_SENSOR_ARCHITECTURE_V1.md
single_pinned_operator_route: /external-scout/24-7
canonical_api_route: /api/v1/external-scout/24-7-proof
status_values:
- Checked and found
- Checked and not found
- Candidate found, not imported
- Not checked
- Stale
- Blocked / login required
owner_values:
- ChatGPT
- AUTOSINT
- Adapter
- User key needed
- External source
pipeline_nodes:
- id: chatgpt_external_scout
  label: ChatGPT External Scout
  stage: A
  owner: ChatGPT
  what_it_does: Discovers public signals and emits strict candidate packets.
- id: capture
  label: Capture
  stage: B
  owner: AUTOSINT
  what_it_does: Selects the exact output chat, extracts the latest strict packet, and writes ignored staging receipts.
- id: validator
  label: Validator
  stage: C
  owner: AUTOSINT
  what_it_does: Validates schema, required lanes, cue-only discipline, and no-mutation flags.
- id: promotion_quarantine
  label: Promotion / Quarantine
  stage: D
  owner: AUTOSINT
  what_it_does: Promotes valid packets and quarantines invalid packets without updating active state from invalid data.
- id: thread_memory
  label: Thread Memory
  stage: E
  owner: AUTOSINT
  what_it_does: Builds active, stale tracked, and archived case memory from validated packets.
- id: enrichment_adapters
  label: Enrichment / Adapters
  stage: F
  owner: Adapter
  what_it_does: Verifies source URLs and market/prediction/finance lanes through read-only adapters.
- id: operator_surfaces
  label: Operator Surfaces
  stage: G
  owner: AUTOSINT
  what_it_does: Renders the pinned proof page and drill-down operator views from the canonical proof report.
- id: health_eval_alerts
  label: Health / Eval / Alerts
  stage: H
  owner: AUTOSINT
  what_it_does: Watches GREEN/WARN/RED health, eval hard-fails, receipts, and recovery prompts.
