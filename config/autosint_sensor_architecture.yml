  owner: ChatGPT
  cue_only: false
  proof_capable: true
  key_required: not_required
  credential_name: none
  next_action_default: Check official/advisory URLs and mark unavailable sources explicitly.
  credential_policy: not_needed_now
  provider_decision: not_blocking
  provider_tier: public_first
  blocker_scope: architecture_reference
  activation_trigger: always_available_public_or_prompt_check
  current_key_need: not_needed_now
  recommended_provider_if_needed: public-first source check
