status_color_semantics:
  GREEN: Public API works, configured adapter works, or public-first lane is healthy; no current active blocker.
  AMBER: Candidate found/not imported, retained/stale follow-up, blocked source URL with public alternatives, optional future
    provider not configured, or non-blocking warning.
  RED: Current active blocker, Live Board stale/active_thread_count_zero, required lane missing from current active thread,
    configured adapter failing when needed, credential required for current active blocker, or wrong-chat/prompt/capture validation
    blocker.
provider_decision_values:
- public_first
- public_api
- configured_api
- optional_later
- paid_or_restricted
- not_needed_now
- current_active_blocker
- retained_stale_followup
- not_blocking
blocker_scope_values:
- current_active
- retained_stale
- architecture_reference
- mixed
source_url_adapter_boundary: A source URL can be blocked, paywalled, or candidate-only while the deterministic adapter for
  the provider is healthy. URL-level access status must not override adapter health.
